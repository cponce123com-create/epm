databases:
  - name: epm-db
    databaseName: epm
    user: epm
    plan: free

services:
  # ── Servicio único: backend + frontend ──────────────────────────────────────
  - type: web
    name: epm
    runtime: node
    plan: free
    rootDir: .
    # Compila primero el frontend (Vite), luego el backend (esbuild)
    # El frontend necesita BASE_PATH=/ y PORT solo para que vite.config.ts no lance error
    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/el-principe-mestizo run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: epm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # ⚠️ SEGURIDAD: Configura ADMIN_EMAIL en el dashboard de Render.
      # No guardes el email real en este archivo (visible en el repo).
      - key: ADMIN_EMAIL
        value: ""
      # ADMIN_PASSWORD se genera automáticamente. Para ver el valor:
      # Render Dashboard → epm → Environment → ADMIN_PASSWORD → Reveal
      - key: ADMIN_PASSWORD
        generateValue: true
      # Con frontend y backend unidos, el origen es el mismo servidor
      - key: FRONTEND_URL
        value: "https://elprincipemestizo.eu.cc"
      # CORS: solo el dominio propio (ya no hay Static Site separado)
      - key: CORS_ORIGINS
        value: "https://elprincipemestizo.eu.cc"
      # VITE_API_URL queda vacío — las llamadas /api/* son al mismo origen
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      # ── RSS Aggregator ──────────────────────────────────────────────────────
      # Secreto para proteger endpoints de cron. Usa el mismo valor en cron-job.org.
      - key: CRON_SECRET
        generateValue: true
      # GROQ_API_KEY (opcional, para briefing con IA)
      # - key: GROQ_API_KEY
      #   value: ""
      # Límite de memoria para evitar OOM kills en plan free (512MB)
      - key: NODE_OPTIONS
        value: "--max-old-space-size=256"
