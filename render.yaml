databases:
  - name: epm-db
    databaseName: epm
    user: epm
    plan: free

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: epm-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: epm-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@elprincinemestizo.com
      - key: ADMIN_PASSWORD
        value: CHANGE_ME_BEFORE_DEPLOY
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: epm-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/el-principe-mestizo run build
    staticPublishPath: artifacts/el-principe-mestizo/dist/public
    routes:
      - type: rewrite
        source: /api/*
        destination: https://epm-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
